services:
  notezy-redis:
    container_name: ${DOCKER_REDIS_SERVICE_NAME}
    # restart: always
    image: redis:7.2.3-alpine
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

  notezy-db:
    # should be the same as DB_HOST(hosting service)
    container_name: ${DOCKER_DB_SERVICE_NAME}
    # restart: always
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  notezy-api:
    container_name: ${DOCKER_API_SERVICE_NAME}
    image: ${DOCKER_API_SERVICE_NAME}:latest
    # restart: always
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.prod
    # entrypoint: ["${ENTRYPOINT_CMD}"]
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DOCKER_DB_PORT}
      GIN_DOMAIN: ${GIN_DOMAIN}
      GIN_PORT: ${GIN_PORT}
      GIN_TRUSTED_PROXIES: ${GIN_TRUSTED_PROXIES}
      JWT_ACCESS_TOKEN_SECRET_KEY: ${JWT_ACCESS_TOKEN_SECRET_KEY}
      JWT_REFRESH_TOKEN_SECRET_KEY: ${JWT_REFRESH_TOKEN_SECRET_KEY}
      REALTIME_TICKET_PRIVATE_KEY_BASE64: ${REALTIME_TICKET_PRIVATE_KEY_BASE64}
      REALTIME_ENABLED: ${REALTIME_ENABLED:-true}
      REALTIME_BETA_USER_PUBLIC_IDS: ${REALTIME_BETA_USER_PUBLIC_IDS:-}
      YJS_WORKER_URLS: ws://notezy-yjs-worker:${DOCKER_YJS_WORKER_PORT:-8787}/internal/realtime/v1
      YJS_MAINTENANCE_WORKER_URL: http://notezy-yjs-worker:${DOCKER_YJS_WORKER_PORT:-8787}/internal/yjs-compaction/v1
      YJS_PROJECTION_WORKER_URL: http://notezy-yjs-worker:${DOCKER_YJS_WORKER_PORT:-8787}/internal/yjs-projection/v1
      OTEL_SERVICE_NAME: notezy-api
      OTEL_SERVICE_VERSION: ${OTEL_SERVICE_VERSION:-unknown}
      OTEL_DEPLOYMENT_ENVIRONMENT: production
      OTEL_EXPORTER_OTLP_GRPC_ENDPOINT: ${OTEL_EXPORTER_OTLP_GRPC_ENDPOINT}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      NOTEZY_OFFICIAL_NAME: ${NOTEZY_OFFICIAL_NAME}
      NOTEZY_OFFICIAL_GMAIL: ${NOTEZY_OFFICIAL_GMAIL}
      NOTEZY_OFFICIAL_GOOGLE_PASSWORD: ${NOTEZY_OFFICIAL_GOOGLE_PASSWORD}
      NOTEZY_OFFICIAL_GOOGLE_APPLICATION_PASSWORD: ${NOTEZY_OFFICIAL_GOOGLE_APPLICATION_PASSWORD}
      ALLOWED_DOMAINS: ${ALLOWED_DOMAINS}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET}
      OAUTH_GOOGLE_REDIRECT_URL: ${OAUTH_GOOGLE_REDIRECT_URL}
    ports:
      - "${GIN_PORT}:${DOCKER_GIN_PORT}"
    depends_on:
      notezy-db:
        condition: service_healthy
      notezy-yjs-worker:
        condition: service_healthy

  notezy-yjs-worker:
    image: ${DOCKER_YJS_WORKER_SERVICE_NAME:-notezy-yjs-worker}:latest
    build:
      context: ./yjs-worker
      dockerfile: Dockerfile # this is based on the build/context of ./yjs-worker
    environment:
      NODE_ENV: production
      YJS_WORKER_HOST: 0.0.0.0
      YJS_WORKER_PORT: ${DOCKER_YJS_WORKER_PORT:-8787}
      OTEL_SERVICE_NAME: notezy-yjs-worker
      OTEL_SERVICE_VERSION: ${OTEL_SERVICE_VERSION:-unknown}
      OTEL_DEPLOYMENT_ENVIRONMENT: production
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    expose:
      - "${DOCKER_YJS_WORKER_PORT:-8787}"

  notezy-nginx:
    image: nginx:1.27-alpine
    container_name: ${DOCKER_NGINX_SERVICE_NAME}
    depends_on:
      - ${DOCKER_API_SERVICE_NAME}
    ports:
      - "${NGINX_HTTP_PORT}:${DOCKER_NGINX_HTTP_PORT}"
      - "${NGINX_HTTPS_PORT}:${DOCKER_NGINX_HTTPS_PORT}"
    volumes:
      - ./infra/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro

volumes:
  redis-data:
    name: notezy-backend-redis-data
  postgres-data:
    name: notezy-backend-postgres-data
